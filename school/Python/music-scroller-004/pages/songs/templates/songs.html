{% extends 'base.html' %}

{% block content %}
<h1>{{ title or "Song List" }}</h1>

  {% for item in data %}
    <div class="song-list-item">
      <div class="song-list-item-info">
        <div class="song-list-item-title">{{ item.title }}</div>
        <div class="song-list-item-album">{{ item.album }}</div>
        <div class="song-list-item-artist">{{ item.artist }}</div>
      </div>
      <div class="song-list-item-actions">
        <div class="song-list-item-action-button">
          <a href="#">Delete Song</a>
        </div>
        <div class="song-list-item-action-button">
          Add To: &nbsp;
          <select>
            <option value="null">[Select Setlist]</option>
            <option>Setlist</option>
            <option>Setlist two</option>
          </select>
        </div>
      </div>
    </div>
  {% endfor %}

  
{% endblock %}
